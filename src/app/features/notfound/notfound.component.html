<section class="bg-white flex items-center justify-center py-9 p-4 relative overflow-hidden selection:bg-neutral-900 selection:text-white font-sans">
    
    <div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-[#c49a7a]/10 rounded-full blur-[100px] animate-[liquid_20s_infinite_alternate]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-neutral-50 rounded-full blur-[80px] animate-[liquid_15s_infinite_alternate-reverse]"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[30%] h-[30%] bg-[#c49a7a]/5 rounded-full blur-[120px] animate-[liquid_25s_infinite]"></div>

    <div class="max-w-300 w-full relative z-10 flex flex-col items-center">
        
        <div class="mb-20 transform hover:scale-110 transition-transform duration-1000 cursor-pointer group">
            <img src="/assets/logo.png" alt="Trendo" class="h-8 object-contain opacity-80 group-hover:opacity-100 transition-opacity" />
            <div class="w-full h-px bg-neutral-100 mt-4 scale-x-0 group-hover:scale-x-100 transition-transform duration-700"></div>
        </div>

        <div class="relative w-full flex flex-col items-center mb-24">
            <h1 class="text-[25vw] lg:text-[280px] font-black text-neutral-900 leading-[0.75] select-none -tracking-widest opacity-5">
                404
            </h1>
            
            <div class="absolute inset-0 flex flex-col items-center justify-center space-y-2">
                <p class="text-2xs font-black uppercase tracking-[0.8em] text-[#c49a7a] mb-10">Discovery Failed</p>
                <h2 class="text-4xl sm:text-6xl lg:text-8xl font-light text-neutral-900 -tracking-wider leading-none">
                    Page Not <span class="italic font-serif text-[#c49a7a]">Found</span>
                </h2>
                <div class="w-16 h-px mt-10"></div>
            </div>
        </div>

        <div class="max-w-xl text-center space-y-12">
            <p class="text-neutral-500 text-sm sm:text-base font-light leading-relaxed tracking-wide italic">
                The path you've chosen leads to a collection that has been retired from our current digital exhibit.
            </p>
            
            <div class="flex flex-col sm:flex-row items-center justify-center gap-12">
                <button routerLink="/shop" 
                   class="relative group px-12 py-5 border border-neutral-900 hover:border-[#c49a7a] cursor-pointer text-xs font-bold uppercase tracking-[0.4em] text-neutral-900 hover:text-white transition-all duration-700 active:scale-95 overflow-hidden">
                    <span class="relative z-10">Back to Collection</span>
                    <div class="absolute inset-0 bg-[#c49a7a] translate-y-full group-hover:translate-y-0 transition-transform duration-500"></div>
                </button>
                
                <a routerLink="/" 
                   class="text-xs font-bold uppercase tracking-[0.4em] text-neutral-400 hover:text-[#c49a7a] transition-all duration-300 flex items-center gap-4 group">
                    Home Page
                    <i class="fas fa-long-arrow-alt-right group-hover:translate-x-2 transition-transform"></i>
                </a>
            </div>
        </div>

    </div>
</section>
