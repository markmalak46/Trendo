<!-- Elegant Brands Marquee — reverse scroll direction from categories -->
<section class="py-12 lg:py-20 bg-white border-t border-neutral-100 font-sans overflow-hidden">
  <div class="px-4 sm:px-6 lg:px-8 max-w-350 mx-auto mb-10">
    <div class="flex items-end justify-between">
      <div>
        <h2 class="text-xs font-bold uppercase tracking-[0.3em] text-neutral-400 mb-2">Shop By</h2>
        <h3 class="text-3xl sm:text-4xl font-light text-neutral-900 tracking-tight">Brands</h3>
      </div>
      <a routerLink="/brands"
        class="text-xs font-bold uppercase tracking-widest text-neutral-900 hover:text-[#c49a7a] transition-colors border-b border-neutral-900 hover:border-[#c49a7a] pb-1">
        View All
      </a>
    </div>
  </div>

  @if (isLoading()) {
  <!-- Skeleton -->
  <div class="flex gap-px bg-neutral-200 border-y border-neutral-200 w-full overflow-hidden">
    @for (item of [1,2,3,4,5,6,7,8]; track $index) {
    <div class="w-40 sm:45 lg:w-50 aspect-square bg-neutral-50 animate-pulse shrink-0"></div>
    }
  </div>
  } @else {
  <!-- Reverse Carousel -->
  <div class="relative w-full no-scrollbar bg-neutral-200 border-y border-neutral-200">
    <div class="animate-carousel-reverse w-max flex gap-px bg-neutral-200">

      <!-- Original Set -->
      <div class="inline-flex gap-px pr-px">
        @for (brand of brandList(); track brand._id) {
        <a [routerLink]="['/brands']"
          class="group relative w-40 sm:45 lg:w-50 aspect-square bg-white flex flex-col items-center justify-center p-6 cursor-pointer hover:bg-neutral-50 transition-colors duration-500">

          <div class="w-full grow relative mb-4 flex items-center justify-center">
            <img [src]="brand.image" [alt]="brand.name"
              class="max-w-[70%] max-h-[70%] object-contain group-hover:scale-[1.05] transition-transform duration-700 mix-blend-multiply" />
          </div>

          <div class="flex flex-col items-center w-full mt-auto">
            <h4 class="text-neutral-900 text-xs sm:text-xs font-bold tracking-[0.2em] uppercase text-center group-hover:text-[#c49a7a] transition-colors line-clamp-1 leading-relaxed">
              {{ brand.name }}
            </h4>
            <span class="w-6 h-px bg-neutral-900 group-hover:bg-[#c49a7a] mt-3 group-hover:w-12 transition-all duration-500"></span>
          </div>

        </a>
        }
      </div>

      <!-- Duplicate Set (for seamless loop) -->
      <div class="inline-flex gap-px pr-px" aria-hidden="true">
        @for (brand of brandList(); track brand._id) {
        <a [routerLink]="['/brands']" tabindex="-1"
          class="group relative w-40 sm:45 lg:w-50 aspect-square bg-white flex flex-col items-center justify-center p-6 cursor-pointer hover:bg-neutral-50 transition-colors duration-500">

          <div class="w-full grow relative mb-4 flex items-center justify-center">
            <img [src]="brand.image" [alt]="brand.name"
              class="max-w-[70%] max-h-[70%] object-contain group-hover:scale-[1.05] transition-transform duration-700 mix-blend-multiply" />
          </div>

          <div class="flex flex-col items-center w-full mt-auto">
            <h4 class="text-neutral-900 text-xs sm:text-xs font-bold tracking-[0.2em] uppercase text-center group-hover:text-[#c49a7a] transition-colors line-clamp-1 leading-relaxed">
              {{ brand.name }}
            </h4>
            <span class="w-6 h-px bg-neutral-900 group-hover:bg-[#c49a7a] mt-3 group-hover:w-12 transition-all duration-500"></span>
          </div>

        </a>
        }
      </div>

    </div>
  </div>
  }
</section>
